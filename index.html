  <!-- ═══════════════════════════════════════════════
       SCRIPTS — load order matters:
       1. script.js    : core engine (defines globals)

       3. enhance.js   : patches globals, adds UI
       4. animation.js : GSAP (loads its own CDN, patches again)
       5. audio.js     : audio system

       GSAP patches happen in animation.js after GSAP CDN loads,
       so it must run last to be the final wrapper on fadeToScene.
  ═══════════════════════════════════════════════ -->
  <script src="script.js"></script>
  <script src="three-scene.js"></script>
  <script src="enhance.js"></script>
  <script src="animation.js"></script>
  <script src="audio.js"></script>

  
  <script>
  (function fixPlayButtonFinal() {
    function enforce() {
      // 1. The play button: make it absolutely clickable
      var btn = document.getElementById('play-btn-main') || document.querySelector('.play-btn');
      if (btn) {
        btn.style.position     = 'relative';
        btn.style.zIndex       = '9000';      // nuclear option: above everything
        btn.style.pointerEvents = 'all';

        // Validate computed style
        var cs = window.getComputedStyle(btn);
        console.log('[fix] play-btn computed z-index:', cs.zIndex, '| pointer-events:', cs.pointerEvents);
      }

      // 2. Kill pointer-events on ALL non-interactive overlays
      var killList = [
        '#three-bg', '#three-bg canvas',
        '#cinematic-overlay', '#grain-canvas', '#scanlines', '#vignette',
        '#letterbox-top', '#letterbox-bottom',
        '#transition-flash', '#start-orbs',
        '.lux-ring', '.orb', '.shockwave', '.chroma-r', '.chroma-b',
        '.sparkle-float', '.heart-float', '.lux-heart-ring',
        '.btn-ripple', '.click-particle',
        '#lux-cursor', '#lux-cursor-dot',
        '#perf-monitor', '#audio-visualiser'
      ];

      killList.forEach(function(sel) {
        document.querySelectorAll(sel).forEach(function(el) {
          el.style.pointerEvents = 'none';
        });
      });

      // 3. Ensure active scene passes events
      var activeScene = document.querySelector('.scene.active');
      if (activeScene) {
        activeScene.style.pointerEvents = 'all';
      }

      console.log('[fix] ✓ Pointer-events enforcement complete.');
    }

    // Run immediately
    enforce();

    // Run again after a delay (for CDN-loaded scripts)
    setTimeout(enforce, 500);
    setTimeout(enforce, 1200);
    setTimeout(enforce, 2500);

    // Also run whenever scene changes
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        if (m.attributeName === 'class') {
          enforce();
        }
      });
    });
    observer.observe(document.body, { subtree: true, attributeFilter: ['class'] });
  })();
  </script>
